name: Build ALPS Kernel with IPC_NS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository (contains config.gz)
      uses: actions/checkout@v4

    - name: Checkout ALPS kernel source
      run: |
        git clone --depth=1 https://github.com/KrutosVIP/generic_kernel_mediatek_alps.git kernel

    - name: Setup build tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc-aarch64-linux-gnu

    - name: Configure kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # 从你的仓库根目录复制 config.gz
        cp ../config.gz .
        gunzip config.gz
        mv config .config
        # 开启 IPC namespace
        scripts/config --file .config -e CONFIG_IPC_NS
        make olddefconfig

    - name: Build kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        make -j$(nproc) Image.gz

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: alps-kernel
        path: kernel/arch/arm64/boot/Image.gz
