name: Build ALPS Kernel with IPC_NS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout ALPS kernel source
      run: |
        git clone --depth=1 https://github.com/KrutosVIP/generic_kernel_mediatek_alps.git kernel

    - name: Setup build tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc-aarch64-linux-gnu

    - name: Configure kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # 关键：使用你手机导出的完美配置文件
        gunzip -c ../config.gz > .config
        # 核心改动：仅开启这一个选项
        scripts/config --file .config -e CONFIG_IPC_NS
        # 优雅地解决新内核配置项的依赖问题
        make olddefconfig

    - name: Build kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        make -j$(nproc) Image.gz

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: alps-kernel
        path: kernel/arch/arm64/boot/Image.gz
