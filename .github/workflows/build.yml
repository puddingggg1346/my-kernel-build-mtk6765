name: Build Final Kernel with xiaomi-mt6765 Source

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kernel source
      run: |
        git clone --depth=1 https://github.com/xiaomi-mt6765/android_kernel_xiaomi_mt6765.git kernel

    - name: Setup build tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc-aarch64-linux-gnu

    - name: Configure kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # 使用红米6的默认配置
        make cereus_defconfig
        # 只开启 IPC namespace
        scripts/config --file .config -e CONFIG_IPC_NS
        make olddefconfig

    - name: Build kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        make -j$(nproc) Image.gz

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: xiaomi-kernel
        path: kernel/arch/arm64/boot/Image.gz