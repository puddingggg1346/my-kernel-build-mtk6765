name: Build ALPS Kernel with IPC_NS (Fix Inline)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Checkout ALPS kernel source
      run: |
        git clone --depth=1 https://github.com/KrutosVIP/generic_kernel_mediatek_alps.git kernel

    - name: Setup build tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc-aarch64-linux-gnu

    - name: Configure kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        cp ../config.gz .
        gunzip config.gz
        mv config .config
        scripts/config --file .config -e CONFIG_IPC_NS
        make olddefconfig

    - name: Build kernel with relaxed inlining
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # 关键修改：添加编译器参数，禁用可能导致错误的严格内联
        make -j$(nproc) Image.gz KBUILD_CFLAGS="-fno-inline-functions-called-once"
