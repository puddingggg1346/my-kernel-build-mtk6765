name: Build Kernel with IPC_NS (Clean Config)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download kernel-lts source
      run: |
        git clone --depth=1 https://github.com/frstprjkt/kernel-lts.git kernel

    - name: Setup build tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc-aarch64-linux-gnu

    - name: Configure kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # 生成一个干净的 arm64 默认配置
        make defconfig
        # 只开启我们需要的 IPC namespace
        scripts/config --file .config -e CONFIG_IPC_NS
        make olddefconfig

    - name: Build kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        make -j$(nproc)

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel/arch/arm64/boot/Image.gz-dtb
