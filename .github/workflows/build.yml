name: Build Mainline MT6765 Kernel (mt6765-next)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your config repository
      uses: actions/checkout@v4

    # 关键改动：直接使用最新的 mt6765-next 分支
    - name: Checkout Mainline MT6765 Kernel (mt6765-next)
      run: |
        git clone --depth=1 --branch mt6765-next https://github.com/adomerle/linux-mt6765.git kernel

    - name: Setup build tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc-aarch64-linux-gnu

    - name: Configure kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # 1. 复制你的手机配置文件作为基础
        cp ../config.gz .
        gunzip config.gz
        mv config .config
        # 2. 只添加我们需要的选项
        scripts/config --file .config -e CONFIG_IPC_NS
        # 3. 优雅地解决配置依赖
        make olddefconfig

    - name: Build kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        # 编译生成内核镜像
        make -j$(nproc) Image.gz

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: mainline-mt6765-kernel
        path: kernel/arch/arm64/boot/Image.gz
