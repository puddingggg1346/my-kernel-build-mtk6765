name: Build Kernel with IPC_NS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download Xiaomi MT6765 kernel source
      run: |
        git clone --depth=1 https://github.com/xiaomi-mt6765/android_kernel_xiaomi_mt6765.git kernel

    - name: List available defconfigs
      run: |
        ls -la kernel/arch/arm64/configs/
